[pytest]
testpaths = tests
pythonpath = .
addopts = -ra -q --html=reports/html/report.html --self-contained-html
markers =
    smoke: quick non-device checks
    integration: requires Appium / devices / apps
    e2e: full cross-surface flow (slow)
    functional: app flows such as login (requires devices + Appium)

filterwarnings =
    ignore::DeprecationWarning
