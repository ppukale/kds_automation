# Non-secret environment defaults. Override via env vars or config/local.yaml.

environment: dev

web:
  # Real POS URL (must resolve in your network). Placeholder will skip web E2E tests.
  base_url: "https://pos.example.local"
  timeout_ms: 30000

# Used when tests run with --channel api (see README).
api:
  orders_submit_url: ""
  timeout_s: 60

appium:
  server_url: "http://127.0.0.1:4723"
  # When running multiple sessions on one host, assign unique ports per role in capabilities.apps.*.server

# Optional pause (seconds) after submit before reading KDS UIs.
kitchen:
  sync_wait_s: 0
  # How each line is rendered: placeholders {qty}, {name}, {sku}
  line_text_format: "{qty}x {name}"
  # When true and order JSON includes order_number, tablets must show that ticket id.
  verify_order_number: true
