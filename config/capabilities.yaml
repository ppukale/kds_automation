# Shared Appium options + per-app overrides (merged at runtime).
# Replace package/activity and app paths with your real AUT values.
#
# `emulator_common` is merged when `kind: emulator` in devices.yaml.
# `device_common` is merged when `kind: device` (physical / Wi‑Fi tablets).

common:
  platformName: Android
  automationName: UiAutomator2
  newCommandTimeout: 120

emulator_common:
  appium:autoGrantPermissions: true
  appium:disableWindowAnimation: true

device_common:
  # Grant runtime permissions automatically (install-time + session). Reduces manual Allow taps.
  appium:autoGrantPermissions: true
  appium:disableWindowAnimation: true
  # Optional: grant specific permissions by name (Android 6+). Use if a dialog still appears.
  # Example:
  # appium:grantPermissions:
  #   - android.permission.POST_NOTIFICATIONS
  #   - android.permission.CAMERA
  #   - android.permission.READ_EXTERNAL_STORAGE

apps:
  gunner:
    appium:appPackage: "com.example.gunner"
    appium:appActivity: ".MainActivity"
    # appium:app: "./resources/apps/gunner.apk"
  bombardier:
    appium:appPackage: "com.example.bombardier"
    appium:appActivity: ".MainActivity"
  wingman:
    appium:appPackage: "com.example.wingman"
    appium:appActivity: ".MainActivity"
  pilot:
    appium:appPackage: "com.loyverse.sale"
    # Resolved from device: adb shell cmd package resolve-activity --brief com.loyverse.sale
    appium:appActivity: "com.loyverse.presentantion.login.LoginActivity"
